<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Radio Body -->
  <rect x="3" y="7" width="18" height="13" rx="3" ry="3" stroke="white" stroke-width="2" />
  
  <!-- Outward Pointing Antennae -->
  <path d="M7 7l-3-4" stroke="white" stroke-width="2" />
  <path d="M17 7l3-4" stroke="white" stroke-width="2" />
  
  <!-- Tuning Dial (White) -->
  <circle cx="8.5" cy="13.5" r="2.5" stroke="white" stroke-width="2" />
  
  <!-- Grey Accents (Frequency Bars) -->
  <line x1="13" y1="12" x2="18" y2="12" stroke="#888888" stroke-width="2" />
  <line x1="13" y1="15" x2="18" y2="15" stroke="#888888" stroke-width="2" />
</svg>