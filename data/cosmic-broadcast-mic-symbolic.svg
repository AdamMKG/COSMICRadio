<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Microphone body -->
  <rect x="8" y="2" width="8" height="12" rx="4" stroke="white" stroke-width="2" />
  <!-- Accent lines (horizontal frequency bars) in grey -->
  <line x1="10" y1="6" x2="14" y2="6" stroke="#888888" stroke-width="1.5" stroke-linecap="round" />
  <line x1="10" y1="9" x2="14" y2="9" stroke="#888888" stroke-width="1.5" stroke-linecap="round" />
  <!-- Microphone stand (the U-shape) -->
  <path d="M5 10C5 13.866 8.13401 17 12 17C15.866 17 19 13.866 19 10" stroke="white" stroke-width="2" stroke-linecap="round" />
  <!-- Base stand -->
  <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round" />
  <line x1="8" y1="22" x2="16" y2="22" stroke="white" stroke-width="2" stroke-linecap="round" />
</svg>
